name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    env:
      # Dev-mode secret so the app boots; production requires a real value.
      DIGITAL_TWIN_QUOTA_SECRET: ci-e2e-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test:e2e
